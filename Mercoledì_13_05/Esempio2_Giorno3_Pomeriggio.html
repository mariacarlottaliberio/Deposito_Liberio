<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="Esempio2_Giorno3_Pomeriggio.css">
    </head>
    <body>
        <!-- ESEMPIO POSITION -->
        <!-- div contenitore in posizione relative -->
        <div class="contenitore">
            <!-- div box in posizione assoluta -->
            <div class="box">Elemento</div>
        </div>
        <br>

        <!-- ESEMPIO CON GRID -->
        <!-- GRIGLIA BASE CON COLONNE E GAP -->
        <div class="container">
            <div class="item1">1</div>
            <div class="item2">2</div>
            <div class="item3">3</div>
        </div>

        <br>
        <!-- ESEMPIO CON FLEX -->

        <div class="containerFlex">
            <div class="itemFlex1">1</div>
            <div class="itemFlex2">2</div>
            <div class="itemFlex3">3</div>
        </div>
        <br>

        <!-- GRIGLIA CON COLONNE E RIGHE -->
        <!-- con il css il div della lettera A
        occuperà 2 colonne
        B occuperà 2 righe
        C si posizionerà sotto A -->
         <div class="containerGridcr">
            <div class="itemGrid1">A</div>
            <div class="itemGrid2">B</div>
            <div class="itemGrid3">C</div>
        </div>


        <!-- GRIGLIA AD AREA -->
        <div class="containerArea">
            <!-- gli item che occupano il container principale -->
            <div class="header">Header</div>
            <div class="sidebar">Sidebar</div>
            <div class="content">Content</div>
            <div class="footer">Footer</div>
        </div>


    </body>
</html>
