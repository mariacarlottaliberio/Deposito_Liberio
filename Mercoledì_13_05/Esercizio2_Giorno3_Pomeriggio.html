<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="Esercizio2_Giorno3_Pomeriggio.css">
    </head>
    <body>

        <!-- container principale che imposta la pagina -->
        <div class="containerGrid">
        <!-- header -->
            <header class="header">
                <h1>Pagina</h1>
            </header>
            
        <!-- container con 2 elementi
        sidebar e container (in cui ho usato flex) -->
            <div class="contenutoCentrale">
                <div class="sidebar">
                    Sidebar
                </div>
            <!-- container con elementi distribuiti con flex -->
                <div class="containerFlex">
                    <div>1</div>
                    <div>2</div>
                    <div>3</div>
                    <div>4</div>
                </div>
            </div>
           
            <footer class="footer">
                Fine pagina
            </footer>
            
            <!-- container in posizione relativa
            contiene il button in posizone assoluta -->
            <div class="containerButton">
                <button class="button">Bottone</button>
            </div>
        </div>
    </body>
</html>
